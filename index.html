<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#ffffff" />
  <title>Zip - Ruta Total</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #f4511e;
      --orange: #f4511e;
      --orange-deep: #e94012;
      --cream: #fff7ed;
      --paper: #fffaf2;
      --text: #fffaf2;
      --ink: #2f221d;
      --muted: #7c4a39;
      --soft: #a46247;
      --line: rgba(105, 54, 29, 0.16);
      --path: #f4511e;
      --path-strong: #d93a10;
      --amber: #ffe7bd;
      --rose: #db3a1c;
      --emerald: #2e7d32;
      --cell: #fff3e5;
      --cell-hover: #ffe4cf;
      --cell-active: #f4511e;
      --shadow: 0 22px 60px rgba(103, 39, 12, 0.22);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--orange-deep);
      color: var(--text);
    }

    body {
      min-height: 100vh;
      position: relative;
      display: flex;
      align-items: stretch;
      justify-content: center;
      padding: max(14px, env(safe-area-inset-top)) 14px max(14px, env(safe-area-inset-bottom));
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -1;
      background:
        radial-gradient(circle at 74% 18%, rgba(255, 196, 150, 0.42), transparent 13%),
        linear-gradient(180deg, #ff6a1f 0%, var(--orange) 46%, var(--orange-deep) 100%);
    }

    button {
      font: inherit;
    }

    .app {
      width: min(100%, 460px);
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
      min-height: calc(100vh - 28px);
    }

    .panel {
      border: 0;
      background: transparent;
      box-shadow: none;
      backdrop-filter: none;
    }

    .board-panel,
    .side-panel {
      border-radius: 28px;
      padding: 0;
    }

    .topbar {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 10px;
      margin: 20px 0 14px;
      text-align: center;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 0;
      background: rgba(117, 46, 16, 0.16);
      color: rgba(255, 255, 255, 0.92);
      border-radius: 999px;
      padding: 7px 13px;
      font-size: 12px;
      font-weight: 800;
      margin-bottom: 12px;
    }

    .zip-mark {
      width: 92px;
      height: 92px;
      border-radius: 18px;
      background: var(--cream);
      box-shadow: 0 16px 34px rgba(127, 43, 11, 0.26), inset 0 -3px 0 rgba(104, 49, 25, 0.1);
      display: grid;
      place-items: center;
      position: relative;
      margin: 0 auto 16px;
    }

    .zip-mark::before {
      content: "";
      width: 60px;
      height: 42px;
      border: 9px solid var(--orange);
      border-left-width: 12px;
      border-right-width: 12px;
      border-radius: 22px;
      transform: skewX(-7deg);
    }

    .zip-mark::after {
      content: "";
      position: absolute;
      width: 13px;
      height: 13px;
      border-radius: 50%;
      background: var(--cream);
      box-shadow:
        -33px -23px 0 var(--cream),
        -33px -23px 0 5px var(--orange),
        33px 23px 0 var(--cream),
        33px 23px 0 5px var(--orange);
      opacity: 0.95;
    }

    h1 {
      margin: 0;
      color: #fff;
      font-size: clamp(42px, 13vw, 60px);
      line-height: 0.95;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 8px 0 0;
      max-width: 320px;
      color: rgba(255, 255, 255, 0.9);
      font-size: 17px;
      line-height: 1.35;
    }

    .level-card {
      min-width: 176px;
      border: 0;
      border-radius: 4px;
      background: var(--cream);
      color: var(--ink);
      padding: 8px 16px;
      box-shadow: 0 10px 24px rgba(117, 46, 16, 0.18);
      position: relative;
    }

    .level-card::before,
    .level-card::after {
      content: "";
      position: absolute;
      top: 0;
      width: 0;
      height: 0;
      border-top: 18px solid transparent;
      border-bottom: 18px solid transparent;
    }

    .level-card::before {
      left: -12px;
      border-right: 12px solid var(--cream);
    }

    .level-card::after {
      right: -12px;
      border-left: 12px solid var(--cream);
    }

    .eyebrow {
      color: var(--soft);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .level-name {
      margin-top: 4px;
      font-weight: 900;
      font-size: 18px;
    }

    .level-difficulty {
      color: var(--orange-deep);
      font-size: 14px;
      margin-top: 2px;
    }

    .board-wrap {
      display: flex;
      justify-content: center;
      padding: 0;
    }

    .board {
      --size: 5;
      width: min(100%, calc(var(--size) * 64px));
      display: grid;
      grid-template-columns: repeat(var(--size), minmax(42px, 1fr));
      gap: 6px;
      border: 1px solid rgba(94, 43, 20, 0.12);
      border-radius: 22px;
      background: var(--paper);
      padding: 10px;
      box-shadow: var(--shadow);
      touch-action: none;
      overscroll-behavior: contain;
    }

    .cell {
      position: relative;
      aspect-ratio: 1;
      min-width: 0;
      border: 1px solid rgba(120, 58, 27, 0.12);
      border-radius: 12px;
      background: var(--cell);
      color: var(--ink);
      display: grid;
      place-items: center;
      font-size: clamp(15px, 2.6vw, 22px);
      font-weight: 950;
      cursor: pointer;
      user-select: none;
      transition: transform 120ms ease, background 150ms ease, color 150ms ease, border-color 150ms ease, box-shadow 150ms ease;
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
    }

    .cell:hover {
      background: var(--cell-hover);
    }

    .cell:active {
      transform: scale(0.94);
    }

    .cell.visited {
      background: var(--cell-active);
      color: #fffaf2;
      border-color: rgba(160, 50, 10, 0.28);
      box-shadow: inset 0 -2px 0 rgba(99, 35, 12, 0.14);
    }

    .cell.current {
      outline: 4px solid rgba(255, 235, 210, 0.9);
      outline-offset: -2px;
    }

    .cell.hint {
      background: var(--amber);
      color: var(--ink);
      border-color: #f5a443;
      outline: 4px solid rgba(255, 235, 210, 0.92);
      outline-offset: 0;
    }

    .cell .order {
      font-size: clamp(11px, 1.9vw, 14px);
      opacity: 0.72;
    }

    .cell.visited:not(.checkpoint)::after {
      content: "";
      position: absolute;
      inset: 8px;
      border: 1px solid rgba(255, 250, 242, 0.38);
      border-radius: 8px;
      pointer-events: none;
    }

    .side-panel {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .status-card,
    .metric,
    .rules {
      border: 1px solid var(--line);
      background: rgba(255, 250, 242, 0.94);
      color: var(--ink);
      border-radius: 16px;
      box-shadow: 0 10px 26px rgba(101, 37, 10, 0.13);
    }

    .status-card {
      padding: 13px 15px;
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }

    .status-icon {
      width: 28px;
      height: 28px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      background: rgba(244, 81, 30, 0.12);
      color: var(--orange-deep);
      font-weight: 950;
      flex: 0 0 auto;
    }

    .status-icon.solved {
      background: rgba(46, 125, 50, 0.14);
      color: var(--emerald);
    }

    .message {
      margin: 4px 0 0;
      font-weight: 750;
      line-height: 1.35;
      color: var(--ink);
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    .metric {
      padding: 10px 8px;
      min-height: 72px;
      text-align: center;
    }

    .metric-label {
      color: var(--soft);
      font-size: 10px;
      line-height: 1.2;
    }

    .metric-value {
      margin-top: 7px;
      font-size: 22px;
      line-height: 1;
      font-weight: 950;
      color: var(--ink);
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .action {
      width: 100%;
      min-height: 48px;
      border: 0;
      border-radius: 999px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      padding: 12px 14px;
      color: var(--ink);
      background: rgba(255, 250, 242, 0.94);
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 10px 24px rgba(101, 37, 10, 0.15);
      transition: transform 140ms ease, background 150ms ease, box-shadow 150ms ease;
    }

    .action:hover {
      background: #fffaf2;
      box-shadow: 0 12px 28px rgba(101, 37, 10, 0.2);
    }

    .action:active {
      transform: translateY(1px);
    }

    .action.hint-button {
      border-color: transparent;
      background: #ffe4bd;
      color: var(--ink);
    }

    .action.next-button {
      border-color: transparent;
      background: #fffaf2;
      color: var(--orange-deep);
      grid-column: 1 / -1;
      min-height: 54px;
    }

    .rules {
      margin: 0;
      padding: 15px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.35;
      display: grid;
      gap: 11px;
    }

    .rule {
      display: flex;
      gap: 9px;
      align-items: flex-start;
    }

    .rule.good::before,
    .rule.bad::before {
      content: "";
      width: 10px;
      height: 10px;
      border-radius: 999px;
      margin-top: 5px;
      flex: 0 0 auto;
    }

    .rule.good::before {
      background: var(--emerald);
    }

    .rule.bad::before {
      background: var(--rose);
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 900px) {
      body {
        align-items: flex-start;
      }

      .app {
        grid-template-columns: 1fr;
      }

      .side-panel {
        order: 2;
      }
    }

    @media (max-width: 560px) {
      body {
        padding: 12px;
      }

      .board-panel,
      .side-panel {
        border-radius: 18px;
        padding: 14px;
      }

      .topbar {
        flex-direction: column;
      }

      .level-card {
        width: 100%;
      }

      .board {
        gap: 6px;
        padding: 8px;
      }

      .cell {
        border-radius: 12px;
      }
    }

    :root {
      color-scheme: light;
      --bg: #ffffff;
      --orange: #f4511e;
      --orange-deep: #dd3d10;
      --cream: #fff7ed;
      --paper: #ffffff;
      --text: #211914;
      --ink: #211914;
      --muted: #6f625c;
      --soft: #8b756b;
      --line: rgba(33, 25, 20, 0.12);
      --cell: #f7f3ee;
      --cell-hover: #f1e9df;
      --cell-active: transparent;
      --shadow: 0 18px 50px rgba(33, 25, 20, 0.12);
    }

    html,
    body {
      background: #ffffff;
      color: var(--ink);
    }

    body {
      align-items: stretch;
      padding: max(18px, env(safe-area-inset-top)) 18px max(18px, env(safe-area-inset-bottom));
    }

    body::before {
      display: none;
    }

    [hidden] {
      display: none !important;
    }

    .app {
      width: min(calc(100vw - 36px), 440px);
      min-height: calc(100dvh - 36px);
      display: grid;
      place-items: center;
    }

    .screen {
      width: 100%;
    }

    .home-screen {
      min-height: calc(100dvh - 36px);
      display: grid;
      align-content: center;
      gap: 26px;
    }

    .home-card {
      width: 100%;
      max-width: 340px;
      margin: 0 auto;
      border: 1px solid rgba(33, 25, 20, 0.08);
      border-radius: 28px;
      background: #ffffff;
      box-shadow: var(--shadow);
      padding: 28px 22px 22px;
      text-align: center;
    }

    .home-card .zip-mark {
      width: 86px;
      height: 86px;
      margin-bottom: 18px;
      background: var(--orange);
      box-shadow: 0 16px 34px rgba(244, 81, 30, 0.22);
    }

    .home-card .zip-mark::before {
      border-color: #ffffff;
    }

    .home-card .zip-mark::after {
      background: var(--orange);
      box-shadow:
        -31px -21px 0 var(--orange),
        -31px -21px 0 5px #ffffff,
        31px 21px 0 var(--orange),
        31px 21px 0 5px #ffffff;
    }

    .home-title {
      margin: 0;
      color: var(--ink);
      font-size: 54px;
      line-height: 0.95;
      font-weight: 950;
    }

    .home-copy {
      width: min(100%, 320px);
      margin: 12px auto 0;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.4;
    }

    .difficulty-group {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin-top: 24px;
      padding: 5px;
      border-radius: 999px;
      background: #f7f3ee;
    }

    .difficulty-button {
      min-width: 0;
      min-height: 44px;
      border: 0;
      border-radius: 999px;
      background: transparent;
      color: var(--muted);
      font-weight: 900;
      font-size: 14px;
      cursor: pointer;
      transition: background 150ms ease, color 150ms ease, box-shadow 150ms ease;
    }

    .difficulty-button.active {
      background: #ffffff;
      color: var(--orange-deep);
      box-shadow: 0 8px 20px rgba(33, 25, 20, 0.12);
    }

    .play-button {
      width: 100%;
      min-height: 56px;
      margin-top: 18px;
      border: 0;
      border-radius: 999px;
      background: var(--orange);
      color: #ffffff;
      font-size: 18px;
      font-weight: 950;
      cursor: pointer;
      box-shadow: 0 16px 28px rgba(244, 81, 30, 0.26);
      transition: transform 140ms ease, background 150ms ease, box-shadow 150ms ease;
    }

    .play-button:active,
    .difficulty-button:active {
      transform: translateY(1px);
    }

    .game-screen {
      min-height: calc(100dvh - 36px);
      display: grid;
      place-items: center;
    }

    .game-screen .board-panel {
      width: 100%;
      display: grid;
      place-items: center;
    }

    .game-screen .board-wrap {
      width: 100%;
      padding: 0;
    }

    .game-screen .board {
      position: relative;
      width: min(100%, 354px);
      grid-template-columns: repeat(var(--size), minmax(0, 1fr));
      gap: 6px;
      border: 0;
      border-radius: 22px;
      background: #ffffff;
      padding: 8px;
      box-shadow: none;
      overflow: visible;
    }

    .path-layer {
      position: absolute;
      inset: 8px;
      z-index: 1;
      width: calc(100% - 16px);
      height: calc(100% - 16px);
      pointer-events: none;
      overflow: visible;
    }

    .path-line {
      fill: none;
      stroke: var(--orange);
      stroke-width: 18;
      stroke-linecap: round;
      stroke-linejoin: round;
      filter: drop-shadow(0 3px 5px rgba(244, 81, 30, 0.18));
    }

    .cell {
      z-index: 2;
      border-color: #e8ddd3;
      border-radius: 12px;
      background: var(--cell);
      color: var(--ink);
      font-size: clamp(18px, 5vw, 24px);
      box-shadow: none;
    }

    .cell:hover {
      background: var(--cell-hover);
    }

    .cell.visited {
      background: transparent;
      color: transparent;
      border-color: transparent;
      box-shadow: none;
    }

    .cell.checkpoint,
    .cell.checkpoint.visited {
      color: var(--ink);
      background: var(--cell);
      border-color: #e8ddd3;
    }

    .cell.checkpoint.visited {
      background: transparent;
      border-color: transparent;
    }

    .cell.current {
      outline: none;
    }

    .cell.hint {
      background: #fff0d8;
      color: var(--ink);
      border-color: #ffd39b;
      outline: 3px solid rgba(244, 81, 30, 0.18);
    }

    .cell .order,
    .cell.visited:not(.checkpoint)::after {
      display: none;
    }
  </style>
</head>
<body>
  <div class="app" id="app">
    <section class="screen home-screen" id="homeScreen" aria-labelledby="homeTitle">
      <div class="home-card">
        <div class="zip-mark" aria-hidden="true"></div>
        <h1 class="home-title" id="homeTitle">Zip</h1>
        <p class="home-copy">Elige una dificultad y dibuja una sola ruta para completar toda la grilla.</p>

        <div class="difficulty-group" aria-label="Dificultad">
          <button class="difficulty-button active" type="button" data-difficulty="Fácil">Fácil</button>
          <button class="difficulty-button" type="button" data-difficulty="Medio">Medio</button>
          <button class="difficulty-button" type="button" data-difficulty="Difícil">Difícil</button>
        </div>

        <button class="play-button" id="playButton" type="button">Jugar</button>
      </div>
    </section>

    <section class="screen game-screen" id="gameScreen" aria-label="Juego" hidden>
      <main class="panel board-panel">
        <section class="board-wrap" aria-label="Tablero de Zip">
          <div class="board" id="board"></div>
        </section>
      </main>
    </section>
  </div>

  <script>
    const keyOf = (cell) => `${cell.r},${cell.c}`;
    const sameCell = (a, b) => a && b && a.r === b.r && a.c === b.c;
    const isAdjacent = (a, b) => Math.abs(a.r - b.r) + Math.abs(a.c - b.c) === 1;

    function serpentinePath(size, reverse = false) {
      const path = [];
      for (let r = 0; r < size; r++) {
        if (r % 2 === 0) {
          for (let c = 0; c < size; c++) path.push({ r, c });
        } else {
          for (let c = size - 1; c >= 0; c--) path.push({ r, c });
        }
      }
      return reverse ? [...path].reverse() : path;
    }

    function spiralPath(size) {
      const path = [];
      let top = 0;
      let bottom = size - 1;
      let left = 0;
      let right = size - 1;

      while (top <= bottom && left <= right) {
        for (let c = left; c <= right; c++) path.push({ r: top, c });
        top++;
        for (let r = top; r <= bottom; r++) path.push({ r, c: right });
        right--;
        if (top <= bottom) {
          for (let c = right; c >= left; c--) path.push({ r: bottom, c });
          bottom--;
        }
        if (left <= right) {
          for (let r = bottom; r >= top; r--) path.push({ r, c: left });
          left++;
        }
      }
      return path;
    }

    function createLevel(name, size, solution, checkpointIndexes, difficulty) {
      return {
        name,
        size,
        solution,
        difficulty,
        checkpoints: checkpointIndexes.map((index, i) => ({ ...solution[index], label: i + 1 }))
      };
    }

    const LEVELS = [
      createLevel("Primer trazo", 5, serpentinePath(5), [0, 6, 12, 18, 24], "Fácil"),
      createLevel("Caracol", 5, spiralPath(5), [0, 7, 12, 18, 24], "Medio"),
      createLevel("Ruta larga", 6, serpentinePath(6), [0, 8, 15, 23, 30, 35], "Medio"),
      createLevel("Espiral cerrada", 6, spiralPath(6), [0, 10, 17, 25, 31, 35], "Difícil"),
      createLevel("De vuelta", 6, serpentinePath(6, true), [0, 6, 13, 22, 29, 35], "Difícil")
    ];

    const state = {
      screen: "home",
      selectedDifficulty: "Fácil",
      levelIndex: 0,
      path: [],
      message: "Toca el número 1 para empezar.",
      hintKey: null,
      errors: 0
    };

    const drawing = {
      active: false,
      pointerId: null,
      lastKey: null
    };

    const el = {
      homeScreen: document.getElementById("homeScreen"),
      gameScreen: document.getElementById("gameScreen"),
      board: document.getElementById("board"),
      playButton: document.getElementById("playButton"),
      difficultyButtons: Array.from(document.querySelectorAll("[data-difficulty]"))
    };

    function getLevel() {
      return LEVELS[state.levelIndex];
    }

    function checkpointByKey(level) {
      const map = new Map();
      level.checkpoints.forEach((cp) => map.set(keyOf(cp), cp.label));
      return map;
    }

    function orderByKey() {
      const map = new Map();
      state.path.forEach((cell, index) => map.set(keyOf(cell), index + 1));
      return map;
    }

    function reachedCheckpoints(level) {
      const checkpoints = checkpointByKey(level);
      return state.path.reduce((count, cell) => {
        const label = checkpoints.get(keyOf(cell));
        return label ? Math.max(count, label) : count;
      }, 0);
    }

    function isSolved(level) {
      return state.path.length === level.size * level.size && reachedCheckpoints(level) === level.checkpoints.length;
    }

    function setMessage(text) {
      state.message = text;
      render();
    }

    function selectDifficulty(difficulty) {
      state.selectedDifficulty = difficulty;
      render();
    }

    function startGame() {
      const levelIndex = LEVELS.findIndex((level) => level.difficulty === state.selectedDifficulty);
      state.levelIndex = levelIndex >= 0 ? levelIndex : 0;
      state.screen = "game";
      state.path = [];
      state.message = "Toca el número 1 para empezar.";
      state.hintKey = null;
      state.errors = 0;
      render();
    }

    function resetLevel() {
      state.path = [];
      state.message = "Toca el número 1 para empezar.";
      state.hintKey = null;
      state.errors = 0;
      render();
    }

    function undo() {
      if (state.path.length === 0) return;
      state.path = state.path.slice(0, -1);
      state.message = "Último movimiento deshecho.";
      state.hintKey = null;
      render();
    }

    function nextLevel() {
      state.levelIndex = (state.levelIndex + 1) % LEVELS.length;
      state.path = [];
      state.message = "Nuevo tablero. Empieza por el número 1.";
      state.hintKey = null;
      state.errors = 0;
      render();
    }

    function showHint() {
      const level = getLevel();
      const totalCells = level.size * level.size;
      if (state.path.length === totalCells) return;

      const followsGuide = state.path.every((cell, index) => sameCell(cell, level.solution[index]));
      if (!followsGuide) {
        state.message = "Tu ruta se desvió del camino guía. Retrocede o reinicia para usar pista.";
        state.hintKey = null;
        render();
        return;
      }

      const nextCell = level.solution[state.path.length];
      if (nextCell) {
        state.hintKey = keyOf(nextCell);
        state.message = "Pista marcada: esa casilla mantiene una solución válida.";
        render();
      }
    }

    function registerError(text) {
      state.errors += 1;
      state.message = text;
      state.hintKey = null;
      render();
    }

    function handleCellClick(cell) {
      const level = getLevel();
      if (isSolved(level)) return;

      const checkpoints = checkpointByKey(level);
      const orders = orderByKey();
      const cellKey = keyOf(cell);
      const checkpointLabel = checkpoints.get(cellKey);
      const last = state.path[state.path.length - 1];
      const previous = state.path[state.path.length - 2];
      const alreadyVisited = orders.has(cellKey);

      if (state.path.length === 0) {
        if (checkpointLabel !== 1) {
          registerError("Debes comenzar en el número 1. Sin atajos, Señor Gallardo.");
          return;
        }
        state.path = [cell];
        state.message = "Bien. Ahora construye una ruta continua hacia el siguiente número.";
        state.hintKey = null;
        render();
        return;
      }

      if (previous && sameCell(cell, previous)) {
        undo();
        return;
      }

      if (sameCell(cell, last)) return;

      if (alreadyVisited) {
        registerError("No puedes cruzar una casilla ya usada. La ruta debe ser única.");
        return;
      }

      if (!isAdjacent(last, cell)) {
        registerError("Movimiento inválido: solo puedes avanzar a una casilla vecina.");
        return;
      }

      const reached = reachedCheckpoints(level);
      if (checkpointLabel && checkpointLabel !== reached + 1) {
        registerError(`Ese número no toca todavía. El siguiente objetivo es el ${reached + 1}.`);
        return;
      }

      const totalCells = level.size * level.size;
      const remaining = totalCells - state.path.length;
      state.path = [...state.path, cell];
      state.hintKey = null;

      const nextReached = checkpointLabel ? checkpointLabel : reached;
      if (state.path.length === totalCells && nextReached === level.checkpoints.length) {
        state.message = "Tablero resuelto. Camino completo, números en orden y sin casillas libres.";
      } else if (checkpointLabel) {
        state.message = `Correcto: llegaste al ${checkpointLabel}. Ahora busca el ${checkpointLabel + 1}.`;
      } else if (remaining - 1 <= 3) {
        state.message = "Cuidado con el cierre: no dejes una isla imposible de completar.";
      } else {
        state.message = "Sigue. El tablero castiga la improvisación más que el error.";
      }
      render();
    }

    function cellFromElement(element) {
      const button = element?.closest?.(".cell");
      if (!button || !el.board.contains(button)) return null;
      return {
        r: Number(button.dataset.row),
        c: Number(button.dataset.col)
      };
    }

    function cellFromPointer(event) {
      return cellFromElement(document.elementFromPoint(event.clientX, event.clientY) || event.target);
    }

    function cellsToTrace(target) {
      const last = state.path[state.path.length - 1];
      if (!last || sameCell(last, target) || isAdjacent(last, target)) return [target];
      if (last.r !== target.r && last.c !== target.c) return [target];

      const cells = [];
      const stepR = Math.sign(target.r - last.r);
      const stepC = Math.sign(target.c - last.c);
      let r = last.r + stepR;
      let c = last.c + stepC;

      while (r !== target.r || c !== target.c) {
        cells.push({ r, c });
        r += stepR;
        c += stepC;
      }
      cells.push(target);
      return cells;
    }

    function tracePointerCell(event) {
      const target = cellFromPointer(event);
      if (!target) return;

      const targetKey = keyOf(target);
      if (targetKey === drawing.lastKey) return;
      drawing.lastKey = targetKey;

      for (const cell of cellsToTrace(target)) {
        const errorsBefore = state.errors;
        handleCellClick(cell);
        if (state.errors > errorsBefore) break;
      }
    }

    function startDrawing(event) {
      if (event.button !== undefined && event.button !== 0) return;
      if (!cellFromPointer(event)) return;

      event.preventDefault();
      drawing.active = true;
      drawing.pointerId = event.pointerId;
      drawing.lastKey = null;
      el.board.classList.add("drawing");

      try {
        el.board.setPointerCapture(event.pointerId);
      } catch {}

      tracePointerCell(event);
    }

    function continueDrawing(event) {
      if (!drawing.active || event.pointerId !== drawing.pointerId) return;
      event.preventDefault();
      tracePointerCell(event);
    }

    function stopDrawing(event) {
      if (drawing.pointerId !== null && event.pointerId !== drawing.pointerId) return;

      try {
        if (drawing.pointerId !== null && el.board.hasPointerCapture?.(drawing.pointerId)) {
          el.board.releasePointerCapture(drawing.pointerId);
        }
      } catch {}

      drawing.active = false;
      drawing.pointerId = null;
      drawing.lastKey = null;
      el.board.classList.remove("drawing");
    }

    function renderBoard(level) {
      const checkpoints = checkpointByKey(level);
      const orders = orderByKey();
      el.board.style.setProperty("--size", level.size);
      el.board.innerHTML = `
        <svg class="path-layer" aria-hidden="true">
          <polyline class="path-line" id="pathLine" points=""></polyline>
        </svg>
      `;

      for (let r = 0; r < level.size; r++) {
        for (let c = 0; c < level.size; c++) {
          const cell = { r, c };
          const cellKey = keyOf(cell);
          const checkpoint = checkpoints.get(cellKey);
          const order = orders.get(cellKey);
          const isCurrent = state.path.length > 0 && sameCell(state.path[state.path.length - 1], cell);
          const button = document.createElement("button");
          button.type = "button";
          button.className = [
            "cell",
            order ? "visited" : "",
            checkpoint ? "checkpoint" : "",
            isCurrent ? "current" : "",
            state.hintKey === cellKey ? "hint" : ""
          ].filter(Boolean).join(" ");
          button.setAttribute("aria-label", `Fila ${r + 1}, columna ${c + 1}`);
          button.dataset.row = String(r);
          button.dataset.col = String(c);
          button.textContent = checkpoint ? String(checkpoint) : "";

          button.addEventListener("keydown", (event) => {
            if (event.key === "Enter" || event.key === " ") {
              event.preventDefault();
              handleCellClick(cell);
            }
          });

          if (!window.PointerEvent) {
            button.addEventListener("click", () => handleCellClick(cell));
          }
          el.board.appendChild(button);
        }
      }

      requestAnimationFrame(renderPathLine);
    }

    function renderPathLine() {
      const line = document.getElementById("pathLine");
      if (!line) return;

      if (state.path.length < 2) {
        line.setAttribute("points", "");
        return;
      }

      const boardRect = el.board.getBoundingClientRect();
      const points = state.path.map((cell) => {
        const button = el.board.querySelector(`[data-row="${cell.r}"][data-col="${cell.c}"]`);
        if (!button) return null;
        const rect = button.getBoundingClientRect();
        return `${rect.left + rect.width / 2 - boardRect.left - 8},${rect.top + rect.height / 2 - boardRect.top - 8}`;
      }).filter(Boolean);

      line.setAttribute("points", points.join(" "));
    }

    function render() {
      const level = getLevel();
      const isGame = state.screen === "game";

      el.homeScreen.hidden = isGame;
      el.gameScreen.hidden = !isGame;

      el.difficultyButtons.forEach((button) => {
        const active = button.dataset.difficulty === state.selectedDifficulty;
        button.classList.toggle("active", active);
        button.setAttribute("aria-pressed", String(active));
      });

      if (isGame) renderBoard(level);
    }

    el.difficultyButtons.forEach((button) => {
      button.addEventListener("click", () => selectDifficulty(button.dataset.difficulty));
    });
    el.playButton.addEventListener("click", startGame);

    if (window.PointerEvent) {
      el.board.addEventListener("pointerdown", startDrawing);
      el.board.addEventListener("pointermove", continueDrawing);
      window.addEventListener("pointerup", stopDrawing);
      window.addEventListener("pointercancel", stopDrawing);
    }

    const requestedDifficulty = new URLSearchParams(window.location.search).get("play");
    if (requestedDifficulty && LEVELS.some((level) => level.difficulty === requestedDifficulty)) {
      state.selectedDifficulty = requestedDifficulty;
      startGame();
    } else {
      render();
    }
  </script>
</body>
</html>
